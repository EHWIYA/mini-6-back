version: 0.0
os: linux
files:
  - source: /app.jar
    destination: /home/ec2-user/app
  - source: /scripts
    destination: /home/ec2-user/app/scripts
permissions:
  - object: /home/ec2-user/app
    pattern: "**"
    mode: "755"
    owner: ec2-user
    group: ec2-user
  - object: /home/ec2-user/app/scripts
    pattern: "*.sh"
    mode: "755"
    owner: ec2-user
    group: ec2-user
hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: ec2-user
  BeforeInstall:
    - location: scripts/prepare.sh
      timeout: 60
  AfterInstall:
    - location: scripts/start.sh
      timeout: 60
      runas: ec2-user
  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: ec2-user
